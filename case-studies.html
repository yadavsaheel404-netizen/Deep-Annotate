<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DeepAnnotate &#8212; Case Studies</title>
  <meta name="description" content="Read case studies on how DeepAnnotate powers leading AI systems across autonomous vehicles and medical AI."/>
  <meta name="theme-color" content="#D4D4D4"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  
  <link rel="stylesheet" href="./css/results.css"/>
  <link rel="stylesheet" href="./css/datasets.css"/>
  <link rel="stylesheet" href="./css/cta.css"/>
  <link rel="stylesheet" href="./css/footer.css"/>
  <link rel="stylesheet" href="./css/case-studies.css"/>
  
  <style>
    :root {
      --bg-grey: #FFFFFF;
      --navy: #0E1F3E;
      --cyan: #0E1F3E;
      --amber: #000000;
      --border-sub: rgba(14, 31, 62, 0.1);
      --text-primary: #0E1F3E;
      --text-secondary: rgba(14, 31, 62, 0.7);
    }
    
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    html {
      scroll-behavior: smooth;
    }
    
    body {
      background: var(--bg-grey);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    
    a {
      text-decoration: none;
      color: inherit;
    }
    
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-grey);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--navy);
      border-radius: 3px;
    }
    
    /* NAVBAR */
    #navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      height: 68px;
      background: #FFFFFF;
      backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(14, 31, 62, 0.08);
    }
    .nav-brand {
      display: flex;
      align-items: center;
      overflow: hidden;
      height: 68px;
    }
    .nav-brand img {
      height: 110px;
      margin: -21px 0;
      width: auto;
      display: block;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 32px;
      list-style: none;
    }
    .nav-links a {
      font-size: 13.5px;
      font-weight: 500;
      color: rgba(14, 31, 62, 0.75);
      transition: color .25s;
    }
    .nav-links a:hover, .nav-links a.active {
      color: var(--cyan);
    }
    .nav-cta {
      display: inline-flex;
      align-items: center;
      padding: 10px 22px;
      border-radius: 100px;
      font-size: 13.5px;
      font-weight: 600;
      color: #FFFFFF;
      background: #0E1F3E;
      transition: all 0.3s;
      box-shadow: 0 4px 12px rgba(14, 31, 62, 0.1);
      border: 1px solid #0E1F3E;
    }
    .nav-cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(14, 31, 62, 0.2);
      background: transparent;
      color: #0E1F3E;
    }
    
    /* LAYOUT & SECTIONS */
    .sw {
      max-width: 1240px;
      margin: 0 auto;
      padding: 0 48px;
    }
    .sp {
      padding-top: 140px;
      padding-bottom: 100px;
    }
    .eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--cyan);
      margin-bottom: 16px;
      display: block;
    }
    .stitle {
      font-size: clamp(38px, 5.5vw, 56px);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1.1;
      background: linear-gradient(135deg, var(--navy), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .ssub {
      font-size: 17px;
      color: var(--text-secondary);
      line-height: 1.7;
      max-width: 640px;
      margin: 16px auto 48px;
      text-align: center;
    }

    /* REVEAL ANIMATIONS */
    .rev {
      opacity: 0;
      transform: translate3d(0, 30px, 0);
      transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      will-change: transform, opacity;
      backface-visibility: hidden;
    }
    .rev.vis {
      opacity: 1;
      transform: translate3d(0, 0, 0);
    }
    .d1 { transition-delay: 0.1s; }
    .d2 { transition-delay: 0.2s; }
    .d3 { transition-delay: 0.3s; }
    .d4 { transition-delay: 0.4s; }

    /* FILTER CAPSULE */
    .filter-capsule-wrap {
      display: flex;
      justify-content: center;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(14, 31, 62, 0.08);
      padding: 10px 24px;
      border-radius: 100px;
      box-shadow: 0 10px 30px rgba(14, 31, 62, 0.04);
      margin: 0 auto 56px;
      width: fit-content;
    }
    .chips-wrapper {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .filter-chip {
      padding: 8px 18px;
      border-radius: 100px;
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .filter-chip:hover {
      color: var(--navy);
      background: rgba(14, 31, 62, 0.05);
    }
    .filter-chip.active {
      background: var(--navy);
      border-color: var(--navy);
      color: #fff;
      box-shadow: 0 4px 12px rgba(14, 31, 62, 0.1);
    }
  </style>
</head>
<body>

<!-- 1. HEADER NAVBAR -->
<nav id="navbar">
  <a href="./index.html" class="nav-brand"><img src="./logo-dark-text.svg" alt="DeepAnnotate Logo" style="height: 52px; width: auto;"/></a>
  <ul class="nav-links">
    <li><a href="./services.html">Services</a></li>
    <li><a href="./how-it-works.html">How It Works</a></li>
    <li><a href="./datasets.html">Datasets</a></li>
    <li><a href="./case-studies.html" class="active">Case Studies</a></li>
    <li><a href="./blog.html">Blog</a></li>
    <li><a href="./about.html">About</a></li>
  </ul>
  <a href="./contact.html" class="nav-cta">Connect to us</a>
</nav>

<!-- 2. HERO -->
<section class="sp">
  <div class="sw">
    <div style="text-align: center;">
      <span class="eyebrow rev d1">Proven Outcomes</span>
      <h1 class="stitle rev d2">Real Results. Real Impact.</h1>
      <p class="ssub rev d3">See how top AI engineering teams use DeepAnnotate to build high-accuracy training datasets and accelerate model deployments.</p>
    </div>
    
    <!-- Filter chips -->
    <div class="filter-capsule-wrap rev d4">
      <div class="chips-wrapper">
        <button class="filter-chip active" data-filter="all">All</button>
        <button class="filter-chip" data-filter="audio / voice ai">Audio / Voice AI</button>
        <button class="filter-chip" data-filter="image / computer vision">Image / Computer Vision</button>
        <button class="filter-chip" data-filter="video / autonomous driving">Video / Autonomous Driving</button>
        <button class="filter-chip" data-filter="video / physical ai">Video / Physical AI</button>
        <button class="filter-chip" data-filter="video / robotics">Video / Robotics</button>
      </div>
    </div>

    <!-- Case Studies Dynamic Showcase List -->
    <div class="case-showcase-container" id="case-studies-container"></div>
  </div>
</section>

<!-- 3. REUSABLE FOOTER MOUNT PLACEHOLDER -->
<div id="footer-placeholder"></div>

<script type="module">
  document.addEventListener('DOMContentLoaded', () => {
    // Mount footer dynamically
    const footerContainer = document.getElementById('footer-placeholder');
    if (footerContainer) {
      fetch('./components/footer.html')
        .then(res => res.text())
        .then(html => {
          footerContainer.innerHTML = html;
        });
    }

    // Load case study data dynamically from JSON
    fetch('./js/case-studies-data.json')
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById('case-studies-container');
        const renderShowcases = (list) => {
          if (list.length === 0) {
            container.innerHTML = `<div style="padding: 48px; text-align: center; color: var(--text-secondary); font-weight: 500; background: #fff; border-radius: 20px;">No case studies found matching this category.</div>`;
            return;
          }

          container.innerHTML = list.map((item, idx) => `
            <div class="case-showcase-row rev vis" data-category="${item.category.toLowerCase()}">
              <div class="case-showcase-img-wrap">
                <img class="case-showcase-img" src="${item.heroImage}" alt="${item.title}" loading="lazy"/>
              </div>
              <div class="case-showcase-content">
                <span class="case-tag">${item.badge}</span>
                <h3 class="case-title">${item.title}</h3>
                <p class="case-desc">${item.challenge.problem.substring(0, 160)}...</p>
                
                <div class="case-stats-grid">
                  <div class="stat-box">
                    <div class="stat-val">${item.metrics.accuracy}</div>
                    <div class="stat-lbl">${item.metricsLabels ? item.metricsLabels.accuracy : 'accuracy sustained'}</div>
                  </div>
                  <div class="stat-box">
                    <div class="stat-val">${item.metrics.datasetSize}</div>
                    <div class="stat-lbl">${item.metricsLabels ? item.metricsLabels.datasetSize : 'annotations delivered'}</div>
                  </div>
                  <div class="stat-box">
                    <div class="stat-val">${item.metrics.deliveryTime}</div>
                    <div class="stat-lbl">${item.metricsLabels ? item.metricsLabels.deliveryTime : 'turnaround'}</div>
                  </div>
                  <div class="stat-box">
                    <div class="stat-val">${item.metrics.annotators}</div>
                    <div class="stat-lbl">${item.metricsLabels ? item.metricsLabels.annotators : 'annotators deployed'}</div>
                  </div>
                </div>
                
                <a href="./case-studies/index.html?slug=${item.slug}" class="case-link">Read Full Case Study &rarr;</a>
              </div>
            </div>
          `).join('');
        };

        renderShowcases(data);

        // Filter chips logic
        const chips = document.querySelectorAll('.filter-chip');

        const applyFilters = () => {
          const activeChip = document.querySelector('.filter-chip.active');
          const filterVal = activeChip ? activeChip.getAttribute('data-filter') : 'all';

          const filtered = data.filter(item => {
            return filterVal === 'all' || item.category.toLowerCase() === filterVal;
          });

          renderShowcases(filtered);
        };

        chips.forEach(chip => {
          chip.addEventListener('click', () => {
            chips.forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            applyFilters();
          });
        });

        // Initialize scroll reveals
        const initScrollReveal = () => {
          const revEls = document.querySelectorAll('.rev');
          const ro = new IntersectionObserver(entries => {
            entries.forEach(e => {
              if (e.isIntersecting) {
                e.target.classList.add('vis');
                ro.unobserve(e.target);
              }
            });
          }, { threshold: 0.07, rootMargin: '0px 0px -30px 0px' });
          revEls.forEach(el => ro.observe(el));
        };

        initScrollReveal();
      });
  });
</script>
</body>
</html>
