<svg width="340" height="80" viewBox="0 0 340 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Blue gradient for the D icon -->
    <linearGradient id="dGrad" x1="0" y1="0" x2="60" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0E1F3E"/>
      <stop offset="100%" stop-color="#1A3A73"/>
    </linearGradient>
  </defs>

  <!-- Left Side: Icon Group -->
  <g transform="translate(5, 8)">
    <!-- Cyan Data Grid (Teal dots fading to left) -->
    <!-- Column 1 (smallest, left) -->
    <rect x="0" y="30" width="3" height="3" rx="1" fill="#00C2EE" opacity="0.4" />
    <!-- Column 2 -->
    <rect x="6" y="26" width="4" height="4" rx="1.5" fill="#00C2EE" opacity="0.6" />
    <rect x="6" y="34" width="4" height="4" rx="1.5" fill="#00C2EE" opacity="0.6" />
    <!-- Column 3 -->
    <rect x="13" y="21" width="5" height="5" rx="2" fill="#00C2EE" opacity="0.8" />
    <rect x="13" y="29" width="5" height="5" rx="2" fill="#00C2EE" opacity="0.8" />
    <rect x="13" y="37" width="5" height="5" rx="2" fill="#00C2EE" opacity="0.8" />
    <!-- Column 4 -->
    <rect x="21" y="16" width="6" height="6" rx="2" fill="#00C2EE" />
    <rect x="21" y="24" width="6" height="6" rx="2" fill="#00C2EE" />
    <rect x="21" y="32" width="6" height="6" rx="2" fill="#00C2EE" />
    <rect x="21" y="40" width="6" height="6" rx="2" fill="#00C2EE" />
    <!-- Column 5 (Inside/aligned with D) -->
    <rect x="29" y="11" width="6" height="6" rx="2" fill="#00C2EE" />
    <rect x="29" y="19" width="6" height="6" rx="2" fill="#00C2EE" />
    <rect x="29" y="27" width="6" height="6" rx="2" fill="#00C2EE" />
    <rect x="29" y="35" width="6" height="6" rx="2" fill="#00C2EE" />
    <rect x="29" y="43" width="6" height="6" rx="2" fill="#00C2EE" />
    <rect x="29" y="51" width="6" height="6" rx="2" fill="#00C2EE" />

    <!-- Outer Letter D (with Face Silhouette Mask/Cutout) -->
    <path d="M38 0 H65 C85 0 95 10 95 32 C95 54 85 64 65 64 H38 V0 Z" fill="url(#dGrad)" />
    
    <!-- White Inner Face Silhouette & Crescent (Negative Space/White overlay) -->
    <path d="M68 15 C60 15 54 21 54 32 C54 43 60 49 68 49 C69 49 67 47 66 45 C64 42 66 38 68 36 C69 35 71 34 71 32 C71 30 69 29 68 28 C66 26 64 22 66 19 C67 17 69 15 68 15 Z" fill="#FFFFFF" />
    
    <!-- Inner D bar cut -->
    <path d="M38 0 V64 H45 V0 H38 Z" fill="url(#dGrad)" />
  </g>
  
  <!-- Right Side: Typography (Dark text for light headers) -->
  <!-- Main Title -->
  <text x="112" y="38" font-family="'Inter', sans-serif" font-weight="800" font-size="23" fill="#0E1F3E" letter-spacing="-0.03em">DeepAnnotate<tspan fill="#0BA8D3">.ai</tspan></text>
  <!-- Slogan -->
  <text x="114" y="54" font-family="'Inter', sans-serif" font-weight="700" font-size="9" fill="#475569" letter-spacing="0.04em">HUMAN INTELLIGENCE. DELIVERED AT SCALE</text>
</svg>
